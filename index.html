// ── GITHUB HELPERS ────────────────────────────────────────────────────────────
async function ghLoad() {
  try {
    const r = await fetch(GH_API, {
      headers: { Authorization: `token ${GH_TOKEN}`, Accept: "application/vnd.github.v3+json" }
    });
    if (!r.ok) return null;
    const json = await r.json();
    const text = decodeURIComponent(escape(atob(json.content.replace(/\s/g, ""))));
    return { data: JSON.parse(text), sha: json.sha };
  } catch { return null; }
}

async function ghSave(data, sha) {
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  try {
    const r = await fetch(GH_API, {
      method: "PUT",
      headers: { Authorization: `token ${GH_TOKEN}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify({ message: "update training data", content: encoded, ...(sha ? { sha } : {}) })
    });
    if (!r.ok) return null;
    const json = await r.json();
    return json.content.sha;
  } catch { return null; }
}

function SetInput({ value, onChange, color, dim }) {
  return (
    <input type="number" min="0" step="0.5" placeholder="—" value={value}
      onChange={e => onChange(e.target.value)}
      style={{ width:"100%", background: dim ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.06)",
        border:`1px solid ${dim ? "rgba(255,255,255,0.07)" : "rgba(255,255,255,0.12)"}`,
        borderRadius:"6px", color: dim ? "rgba(255,255,255,0.4)" : "#fff",
        padding:"7px 4px", fontSize:"14px", textAlign:"center", outline:"none", transition:"all 0.2s" }}
      onFocus={e => { e.target.style.borderColor=color; e.target.style.color="#fff"; e.target.style.background="rgba(255,255,255,0.06)"; }}
      onBlur={e => { e.target.style.borderColor="rgba(255,255,255,0.12)"; }}
    />
  );
}

function ExerciseCard({ exercise, color, sets, prevSets, onChangeSet, onAddSet, onRemoveSet, onRemoveExercise }) {

  const n = sets.length;

    <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:"12px", padding:"14px", marginBottom:"10px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
        <div style={{ flex:1, minWidth:0 }}>
          <span style={{ fontWeight:700, fontSize:"14px", color:"#fff" }}>{exercise.name}</span>
          <span style={{ marginLeft:"8px", fontSize:"11px", color:"rgba(255,255,255,0.35)", fontFamily:"monospace" }}>{n}× · {exercise.repsRange}</span>
        </div>
        <div style={{ display:"flex", gap:"5px", alignItems:"center" }}>
          {allDone && <span style={{ color, fontSize:"14px", marginRight:"4px" }}>✓</span>}
          <button onClick={onRemoveExercise}
            style={{ ...B, background:"rgba(255,255,255,0.05)", borderRadius:"6px", width:"28px", height:"28px", fontSize:"13px", color:"rgba(255,100,100,0.6)", flexShrink:0 }}

            onTouchEnd={e => e.currentTarget.style.color="rgba(255,100,100,0.6)"}
          >✕</button>
        </div>
      </div>
      {n > 0 && (
        <div style={{ display:"grid", gridTemplateColumns:`38px repeat(${n}, 1fr) 28px`, gap:"5px", alignItems:"center", marginBottom:"8px" }}>
          <div/>
          {sets.map((_, i) => (
            <div key={i} style={{ textAlign:"center", position:"relative" }}>
              <div style={{ fontSize:"10px", color:"rgba(255,255,255,0.3)", fontFamily:"monospace" }}>S{i+1}</div>
              {n > 1 && (
                <button onClick={() => onRemoveSet(i)}
                  style={{ ...B, position:"absolute", top:"-1px", right:"-2px", width:"12px", height:"12px", fontSize:"9px", background:"rgba(255,80,80,0.25)", borderRadius:"50%", color:"rgba(255,120,120,0.9)", padding:0 }}
                >×</button>
              )}
            </div>
          ))}
          <div/>
          <div style={{ fontSize:"10px", color:"rgba(255,255,255,0.35)", fontFamily:"monospace" }}>KG</div>
          {sets.map((s,i) => <SetInput key={i} value={s.kg} onChange={v=>onChangeSet(i,"kg",v)} color={color} dim={!!prevSets?.[i]?.kg && s.kg===prevSets[i].kg}/>)}

function RoutineView({ routineName, routines, onBack, onUpdateRoutine, onAddSession, lastSession, syncing }) {
  const routine = routines[routineName];
  const [sets, setSets] = useState(() =>
    Object.fromEntries(routine.exercises.map(ex => {
      const prev = lastSession?.sets?.[ex.id];
      const n = prev?.length || routine.defaultSets[ex.id] || 3;
      return [ex.id, Array.from({length:n}, (_,i) => ({ kg: prev?.[i]?.kg ?? "", reps: prev?.[i]?.reps ?? "" }))];
    }))
  );
  const [note, setNote] = useState("");
  const [saved, setSaved] = useState(false);
  const [showAdd, setShowAdd] = useState(false);

  const total  = Object.values(sets).reduce((a,s)=>a+s.length,0);
  const filled = Object.values(sets).flat().filter(s=>s.kg&&s.reps).length;
  const pct    = total>0 ? Math.round(filled/total*100) : 0;

  const chg   = (id,i,f,v) => { setSets(p=>({...p,[id]:p[id].map((s,j)=>j===i?{...s,[f]:v}:s)})); setSaved(false); };
  const addS  = id => { setSets(p=>({...p,[id]:[...p[id],{kg:"",reps:""}]})); setSaved(false); };
  const rmS   = (id,i) => { setSets(p=>({...p,[id]:p[id].filter((_,j)=>j!==i)})); setSaved(false); };
  const rmEx  = id => { onUpdateRoutine(routineName,{...routine,exercises:routine.exercises.filter(e=>e.id!==id)}); setSets(p=>{const n={...p};delete n[id];return n;}); setSaved(false); };
  const addEx = (name,repsRange) => {
    const id=nextId++;
    onUpdateRoutine(routineName,{...routine,exercises:[...routine.exercises,{id,name,repsRange}],defaultSets:{...routine.defaultSets,[id]:3}});
    setSets(p=>({...p,[id]:[{kg:"",reps:""},{kg:"",reps:""},{kg:"",reps:""}]}));
    setShowAdd(false); setSaved(false);
  };
  const save = async () => {
    const date = new Date().toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"});
    await onAddSession({routine:routineName,date,sets,exercises:routine.exercises,note,progress:pct});
    setSaved(true);
  };

  return (
    <div>
      <button onClick={onBack} style={{...B,background:"none",color:"rgba(255,255,255,0.5)",fontSize:"14px",padding:"0 0 20px 0",gap:"6px"}}>← Volver</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom: lastSession ? "10px" : "20px"}}>
        <div>
          <div style={{fontSize:"11px",fontFamily:"monospace",color:routine.color,letterSpacing:"0.15em",marginBottom:"4px"}}>{routine.emoji} SESIÓN ACTIVA</div>
          <h2 style={{fontSize:"28px",fontWeight:800,color:"#fff",margin:0}}>{routineName}</h2>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:"32px",fontWeight:800,color:routine.color}}>{pct}%</div>
          <div style={{fontSize:"11px",color:"rgba(255,255,255,0.35)"}}>completado</div>
        </div>
      </div>
      {lastSession && (
        <div style={{fontSize:"11px",color:"rgba(255,255,255,0.3)",fontFamily:"monospace",marginBottom:"16px",display:"flex",alignItems:"center",gap:"6px"}}>
          <span style={{color:routine.color}}>↑</span> Valores del {lastSession.date} · toca para editar
        </div>
      )}
      <div style={{height:"3px",background:"rgba(255,255,255,0.08)",borderRadius:"99px",marginBottom:"20px",overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:routine.color,borderRadius:"99px",transition:"width 0.4s ease"}}/>
      </div>

      {routine.exercises.map(ex => (
        <ExerciseCard key={ex.id} exercise={ex} color={routine.color} sets={sets[ex.id]||[]} prevSets={lastSession?.sets?.[ex.id]}
          onChangeSet={(i,f,v)=>chg(ex.id,i,f,v)} onAddSet={()=>addS(ex.id)}
          onRemoveSet={i=>rmS(ex.id,i)} onRemoveExercise={()=>rmEx(ex.id)}/>
      ))}

      {showAdd
        ? <AddExerciseForm color={routine.color} onAdd={addEx} onCancel={()=>setShowAdd(false)}/>
        : <button onClick={()=>setShowAdd(true)}
            style={{...B,width:"100%",padding:"13px",background:"transparent",border:"1px dashed rgba(255,255,255,0.15)",borderRadius:"10px",color:"rgba(255,255,255,0.35)",fontSize:"13px",gap:"6px",marginBottom:"16px"}}>
            + Añadir ejercicio
          </button>
      }

      <textarea placeholder="Notas de la sesión..." value={note} onChange={e=>setNote(e.target.value)}
        style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"10px",color:"rgba(255,255,255,0.7)",padding:"12px",fontSize:"13px",resize:"none",outline:"none",minHeight:"60px",boxSizing:"border-box",marginBottom:"12px"}}/>

      <button onClick={save} disabled={syncing}
        style={{...B,width:"100%",padding:"15px",background: saved?"rgba(255,255,255,0.08)":routine.color,borderRadius:"10px",color:"#fff",fontWeight:700,fontSize:"15px",letterSpacing:"0.05em",transition:"all 0.3s",opacity:syncing?0.7:1}}>
        {syncing ? "GUARDANDO..." : saved ? "✓ SESIÓN GUARDADA" : "GUARDAR SESIÓN"}
      </button>
    </div>
  );
}

      <div style={{textAlign:"center",color:"rgba(255,255,255,0.3)",marginTop:"80px"}}>
        <div style={{fontSize:"40px",marginBottom:"12px"}}>📭</div>
        <div>Aún no hay sesiones registradas</div>
      </div>
    </div>
  );
  return (
    <div>
      <button onClick={onBack} style={{...B,background:"none",color:"rgba(255,255,255,0.5)",fontSize:"14px",padding:"0 0 20px 0"}}>← Volver</button>
      <h2 style={{fontWeight:800,color:"#fff",marginBottom:"20px",fontSize:"24px"}}>Historial</h2>
      {[...sessions].reverse().map((s,idx) => {
        const ri = sessions.length-1-idx;
        const info = INITIAL_ROUTINES[s.routine]||{color:"#888",emoji:"🏋️"};
        return (
          <div key={idx} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderLeft:`3px solid ${info.color}`,borderRadius:"10px",padding:"16px",marginBottom:"12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
              <span style={{fontWeight:700,color:"#fff"}}>{info.emoji} {s.routine}</span>
              <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",fontFamily:"monospace"}}>{s.date}</span>
                <button onClick={()=>onDelete(ri)} disabled={syncing}
                  style={{...B,background:"none",fontSize:"15px",color:"rgba(255,100,100,0.45)",width:"22px",height:"22px"}}>🗑</button>
              </div>
            </div>
            <div style={{fontSize:"12px",color:info.color,fontFamily:"monospace",marginBottom:"8px"}}>{s.progress}% completado</div>
            {s.note&&<div style={{marginBottom:"8px",fontSize:"12px",color:"rgba(255,255,255,0.4)",fontStyle:"italic"}}>{s.note}</div>}
            {s.exercises?.map(ex=>{
              const exSets=(s.sets[ex.id]||[]).filter(x=>x.kg&&x.reps);
              if(!exSets.length) return null;
              return <div key={ex.id} style={{fontSize:"11px",color:"rgba(255,255,255,0.35)",marginBottom:"3px",fontFamily:"monospace"}}>
                <span style={{color:"rgba(255,255,255,0.6)"}}>{ex.name}:</span>{" "}{exSets.map(x=>`${x.kg}kg×${x.reps}`).join(" | ")}
              </div>;
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [view,     setView]     = useState("home");
  const [active,   setActive]   = useState(null);
  const [sessions, setSessions] = useState([]);
  const [routines, setRoutines] = useState(INITIAL_ROUTINES);
  const [loading,  setLoading]  = useState(true);
  const [syncing,  setSyncing]  = useState(false);
  const [syncOk,   setSyncOk]   = useState(null); // null | true | false
  const shaRef = useRef(null);

  useEffect(() => {
    (async () => {
      const result = await ghLoad();
      if (result) {
        const { data, sha } = result;
        shaRef.current = sha;
        if (data.sessions) setSessions(data.sessions);
        if (data.routines) {
          const merged = {};
          for (const day of DAYS) {
            merged[day] = { ...INITIAL_ROUTINES[day], ...data.routines[day], color: INITIAL_ROUTINES[day].color, emoji: INITIAL_ROUTINES[day].emoji };
          }
          setRoutines(merged);
        }
        setSyncOk(true);
      } else {
        setSyncOk(false);
      }
      setLoading(false);
    })();
  }, []);

  const persist = async (newSessions, newRoutines) => {
    setSyncing(true);
    // Always reload sha before writing to avoid conflicts
    const latest = await ghLoad();
    const sha = latest ? latest.sha : shaRef.current;
    const newSha = await ghSave({ sessions: newSessions, routines: newRoutines }, sha);
    if (newSha) { shaRef.current = newSha; setSyncOk(true); } else { setSyncOk(false); }
    setSyncing(false);
  };

  const addSession  = async s => { const u=[...sessions,s]; setSessions(u); await persist(u, routines); };
  const delSession  = async i => { const u=sessions.filter((_,j)=>j!==i); setSessions(u); await persist(u, routines); };
  const updRoutine  = async (name,r) => { const u={...routines,[name]:r}; setRoutines(u); await persist(sessions, u); };

  if (loading) return <div className="loading">CARGANDO...</div>;

  return (
    <div id="app">
      {view==="home" && (
        <div>
          <div style={{marginBottom:"40px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
              <div style={{fontSize:"10px",letterSpacing:"0.2em",color:"rgba(255,255,255,0.3)",fontFamily:"monospace"}}>CICLO PPL · 4 SEMANAS</div>
              <div style={{fontSize:"10px",fontFamily:"monospace",letterSpacing:"0.08em",display:"flex",alignItems:"center",gap:"5px"}}>
                {syncing
                  ? <><span style={{color:"#4ECDC4"}}>●</span><span style={{color:"#4ECDC4"}}>GUARDANDO</span></>
                  : syncOk === true
                    ? <><span style={{color:"rgba(255,255,255,0.2)"}}>●</span><span style={{color:"rgba(255,255,255,0.2)"}}>GITHUB ✓</span></>
                    : <><span style={{color:"#ff6b6b"}}>●</span><span style={{color:"#ff6b6b"}}>SIN CONEXIÓN</span></>
                }
              </div>
            </div>
            <h1 style={{fontSize:"36px",fontWeight:800,color:"#fff",lineHeight:1}}>
              Mi<br/>
              <span style={{background:"linear-gradient(90deg,#FF6B35,#4ECDC4,#A855F7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Entrenamiento</span>
            </h1>
          </div>

          <div style={{marginBottom:"12px"}}>
            <div style={{fontSize:"10px",letterSpacing:"0.15em",color:"rgba(255,255,255,0.3)",marginBottom:"14px",fontFamily:"monospace"}}>RUTINAS</div>
            {DAYS.map(day=>{
              const r=routines[day];
              const ds=sessions.filter(s=>s.routine===day);
              const last=[...sessions].reverse().find(s=>s.routine===day);
              return (
                <button key={day} onClick={()=>{setActive(day);setView("routine");}}
                  style={{...B,width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"14px",padding:"20px",marginBottom:"10px",textAlign:"left",justifyContent:"space-between"}}
                  onTouchStart={e=>{e.currentTarget.style.background="rgba(255,255,255,0.08)";e.currentTarget.style.borderColor=r.color;}}
                  onTouchEnd={e=>{e.currentTarget.style.background="rgba(255,255,255,0.04)";e.currentTarget.style.borderColor="rgba(255,255,255,0.08)";}}
                >
                  <div>
                    <div style={{fontSize:"20px",fontWeight:800,color:"#fff",marginBottom:"4px"}}>{r.emoji} {day}</div>
                    <div style={{fontSize:"11px",color:"rgba(255,255,255,0.35)",fontFamily:"monospace"}}>
                      {r.exercises.length} ejercicios · {ds.length} sesiones
                      {last && <span style={{color:r.color}}> · último: {last.date}</span>}
                    </div>
                  </div>
                  <div style={{width:"32px",height:"32px",borderRadius:"50%",background:r.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"16px",flexShrink:0}}>→</div>
                </button>
              );
            })}
          </div>

          <div style={{marginTop:"32px"}}>
            <div style={{fontSize:"10px",letterSpacing:"0.15em",color:"rgba(255,255,255,0.3)",marginBottom:"14px",fontFamily:"monospace"}}>RESUMEN</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px"}}>
              {[
                {label:"Sesiones",value:sessions.length,color:"#FF6B35"},
                {label:"Push A",value:sessions.filter(s=>s.routine==="Push A").length,color:"#FF6B35"},
                {label:"Pull A",value:sessions.filter(s=>s.routine==="Pull A").length,color:"#4ECDC4"},
              ].map(st=>(
                <div key={st.label} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"10px",padding:"14px 12px",textAlign:"center"}}>
                  <div style={{fontSize:"28px",fontWeight:800,color:st.color}}>{st.value}</div>
                  <div style={{fontSize:"10px",color:"rgba(255,255,255,0.3)",fontFamily:"monospace",letterSpacing:"0.1em"}}>{st.label.toUpperCase()}</div>
                </div>
              ))}
            </div>
          </div>

          {sessions.length>0&&(
            <button onClick={()=>setView("history")}
              style={{...B,width:"100%",marginTop:"16px",padding:"13px",background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"10px",color:"rgba(255,255,255,0.5)",fontSize:"13px",letterSpacing:"0.05em"}}>
              VER HISTORIAL ({sessions.length})
            </button>
          )}
        </div>
      )}

      {view==="routine"&&active&&(
        <RoutineView routineName={active} routines={routines} onBack={()=>setView("home")}
          onUpdateRoutine={updRoutine} onAddSession={addSession} syncing={syncing}
          lastSession={[...sessions].reverse().find(s=>s.routine===active)}/>
      )}
      {view==="history"&&(
        <HistoryView sessions={sessions} onBack={()=>setView("home")} onDelete={delSession} syncing={syncing}/>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App/>);

  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/Gym-tracker/sw.js');
    }
  </script>
</body>
</html>
